name: Build e deploy sito Astro su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Installa dipendenze
        run: npm ci
      - name: Build Astro
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy su GitHub Pages
        uses: actions/deploy-pages@v4
